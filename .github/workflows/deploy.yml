name: Déploiement GitHub Pages

# Déploie le site statique sur GitHub Pages à chaque push sur main.
# Pré-requis : dans Settings → Pages, choisir « GitHub Actions » comme source.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule celui en cours si besoin.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Pages
        uses: actions/configure-pages@v5

      - name: Upload de l'artefact (site complet)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déploiement
        id: deployment
        uses: actions/deploy-pages@v4
